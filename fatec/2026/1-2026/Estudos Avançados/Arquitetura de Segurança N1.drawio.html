olor: light-dark(rgb(0, 0, 0), rgb(255, 255, 255)); background-color: transparent;&amp;quot;&amp;gt;não permitir root over ssh&amp;lt;br&amp;gt;- acesso remoto apenas criptografado e com par de chaves,&amp;lt;br&amp;gt;- containers em redes apartadas&amp;lt;br&amp;gt;- configuração de redundância nos Pods para balanceamento de carga;&amp;lt;br&amp;gt;- Sensores de SIEM e XDRs&amp;lt;/span&amp;gt;&amp;lt;span style=&amp;quot;background-color: transparent; color: light-dark(rgb(0, 0, 0), rgb(255, 255, 255));&amp;quot;&amp;gt;&amp;lt;/span&amp;gt;&amp;lt;/p&amp;gt;&amp;lt;p style=&amp;quot;font-size: 12px; font-weight: 400;&amp;quot;&amp;gt;&amp;lt;br&amp;gt;&amp;lt;/p&amp;gt;&amp;lt;/h1&amp;gt;&amp;lt;p&amp;gt;&amp;lt;br&amp;gt;&amp;lt;/p&amp;gt;\&quot; vertex=\&quot;1\&quot;&gt;\n          &lt;mxGeometry height=\&quot;238\&quot; width=\&quot;353.46\&quot; x=\&quot;-409.0000000000001\&quot; y=\&quot;120\&quot; as=\&quot;geometry\&quot; /&gt;\n        &lt;/mxCell&gt;\n        &lt;mxCell id=\&quot;qBCxrTD1t-5IboGwivxb-19\&quot; parent=\&quot;1\&quot; style=\&quot;text;html=1;whiteSpace=wrap;overflow=hidden;rounded=0;\&quot; value=\&quot;&amp;lt;h1 style=&amp;quot;margin-top: 0px;&amp;quot;&amp;gt;&amp;lt;p style=&amp;quot;font-size: 12px; font-weight: 400;&amp;quot;&amp;gt;&amp;lt;br&amp;gt;&amp;lt;/p&amp;gt;&amp;lt;/h1&amp;gt;\&quot; vertex=\&quot;1\&quot;&gt;\n          &lt;mxGeometry height=\&quot;147.56\&quot; width=\&quot;208\&quot; x=\&quot;-582.46\&quot; y=\&quot;230.44\&quot; as=\&quot;geometry\&quot; /&gt;\n        &lt;/mxCell&gt;\n        &lt;mxCell id=\&quot;qBCxrTD1t-5IboGwivxb-23\&quot; parent=\&quot;1\&quot; style=\&quot;text;html=1;whiteSpace=wrap;overflow=hidden;rounded=0;\&quot; value=\&quot;&amp;lt;h1 style=&amp;quot;margin-top: 0px;&amp;quot;&amp;gt;Servidores&amp;lt;/h1&amp;gt;&amp;lt;p&amp;gt;Servidores on premise conectados à rede, servindo de redundância e também para disponibilizar serviços específicos.&amp;lt;br&amp;gt;&amp;lt;br&amp;gt;- LDAP e RBAC -&amp;amp;gt; com foco em permitir autenticação dos usuários ao sistema,&amp;lt;br&amp;gt;- VPN -&amp;amp;gt; para tunelar o tráfego externo;&amp;lt;br&amp;gt;- Modelo AAA&amp;amp;nbsp; -&amp;amp;gt; para garantir a integridade do ambiente, assim como disponibilizar recursos de auditoria&amp;lt;br&amp;gt;- Sensores para SIEMs e XDRs&amp;lt;br&amp;gt;&amp;lt;br&amp;gt;&amp;lt;/p&amp;gt;\&quot; vertex=\&quot;1\&quot;&gt;\n          &lt;mxGeometry height=\&quot;229\&quot; width=\&quot;332.08\&quot; x=\&quot;-589.19\&quot; y=\&quot;449\&quot; as=\&quot;geometry\&quot; /&gt;\n        &lt;/mxCell&gt;\n        &lt;mxCell id=\&quot;omJtJDtHG3TjwU-hScu0-3\&quot; parent=\&quot;1\&quot; style=\&quot;text;html=1;whiteSpace=wrap;overflow=hidden;rounded=0;\&quot; value=\&quot;&amp;lt;h1 style=&amp;quot;margin-top: 0px;&amp;quot;&amp;gt;NG Firewall&amp;lt;/h1&amp;gt;&amp;lt;p&amp;gt;Implementar um NG Firewall para bloquear acesso de sites específicos, protocolos e portas também. Sendo esta uma primeira barreira&amp;amp;nbsp;&amp;lt;br&amp;gt;&amp;lt;br&amp;gt;Proteção&amp;lt;br&amp;gt;- Proxy de Acesso ao sistema&amp;lt;br&amp;gt;- DPI (inspeção de pacotes) -&amp;amp;gt; dinamica a partir do CTI&amp;lt;br&amp;gt;- VPN + MFA&amp;lt;br&amp;gt;-&amp;amp;nbsp;SPI (Stateful Packet Inspection): Monitoramento do estado das conexões ativas;&amp;lt;br&amp;gt;-&amp;amp;nbsp;Hardening de Gerenciamento: Acesso à interface de configuração apenas via VPN + MFA;&amp;lt;br&amp;gt;-&amp;amp;nbsp;Segurança de Camada 2: Implementação de WPA3 para conexões wireless administrativas.&amp;lt;br&amp;gt;&amp;lt;/p&amp;gt;\&quot; vertex=\&quot;1\&quot;&gt;\n          &lt;mxGeometry height=\&quot;223.06\&quot; width=\&quot;300.79\&quot; x=\&quot;-575.7884047267355\&quot; y=\&quot;-320.8971335504886\&quot; as=\&quot;geometry\&quot; /&gt;\n        &lt;/mxCell&gt;\n        &lt;mxCell id=\&quot;ltrvb-yTxWj_hHEfyjnM-3\&quot; parent=\&quot;1\&quot; style=\&quot;text;html=1;whiteSpace=wrap;overflow=hidden;rounded=0;\&quot; value=\&quot;&amp;lt;h1 style=&amp;quot;margin-top: 0px;&amp;quot;&amp;gt;WAF&amp;lt;/h1&amp;gt;&amp;lt;p&amp;gt;Garantir a segurança dos serviços presentes&amp;amp;nbsp; no ambiente, garantindo resistencia a ataques sofisticados&amp;lt;/p&amp;gt;&amp;lt;p&amp;gt;Importante:&amp;lt;/p&amp;gt;&amp;lt;p&amp;gt;- filtragem de trafego HTTP;HTTPS&amp;lt;br&amp;gt;- bloqueio de ameças OWASP TOP 10&amp;lt;br&amp;gt;- gerenciamento de presença de BOTs;&amp;lt;br&amp;gt;- mitigação de DDoS&amp;lt;br&amp;gt;- segurança de APIs&amp;lt;br&amp;gt;&amp;lt;span style=&amp;quot;background-color: transparent; color: light-dark(rgb(0, 0, 0), rgb(255, 255, 255));&amp;quot;&amp;gt;- Analise COmportamental com IA;&amp;lt;br&amp;gt;-&amp;amp;nbsp;&amp;lt;/span&amp;gt;&amp;lt;span style=&amp;quot;background-color: transparent;&amp;quot;&amp;gt;Serviços de Identidade: Integração com LDAP/RADIUS para aplicar políticas baseadas no usuário (Identity-Aware).&amp;lt;/span&amp;gt;&amp;lt;/p&amp;gt;&amp;lt;p&amp;gt;&amp;lt;br&amp;gt;&amp;lt;br&amp;gt;&amp;lt;/p&amp;gt;\&quot; vertex=\&quot;1\&quot;&gt;\n          &lt;mxGeometry height=\&quot;235.27298588490768\&quot; width=\&quot;332.0750738552437\&quot; x=\&quot;-233.7347415066469\&quot; y=\&quot;-324.2653854505972\&quot; as=\&quot;geometry\&quot; /&gt;\n        &lt;/mxCell&gt;\n        &lt;mxCell id=\&quot;RzzEl4RtM9gMvDJJZMXP-5\&quot; parent=\&quot;1\&quot; style=\&quot;text;html=1;whiteSpace=wrap;overflow=hidden;rounded=0;\&quot; value=\&quot;&amp;lt;h1 style=&amp;quot;margin-top: 0px;&amp;quot;&amp;gt;&amp;lt;span style=&amp;quot;background-color: transparent; color: light-dark(rgb(0, 0, 0), rgb(255, 255, 255));&amp;quot;&amp;gt;VMs e Containers&amp;lt;/span&amp;gt;&amp;lt;/h1&amp;gt;&amp;lt;h1 style=&amp;quot;margin-top: 0px;&amp;quot;&amp;gt;&amp;lt;span style=&amp;quot;background-color: transparent; color: light-dark(rgb(0, 0, 0), rgb(255, 255, 255)); font-size: 12px; font-weight: normal;&amp;quot;&amp;gt;Implementar virtualização segura e orquestração resiliente.&amp;lt;/span&amp;gt;&amp;lt;/h1&amp;gt;&amp;lt;p&amp;gt;&amp;lt;span style=&amp;quot;background-color: transparent; color: light-dark(rgb(0, 0, 0), rgb(255, 255, 255));&amp;quot;&amp;gt;Proteção:&amp;lt;br&amp;gt;&amp;lt;/span&amp;gt;&amp;lt;span style=&amp;quot;background-color: transparent; color: light-dark(rgb(0, 0, 0), rgb(255, 255, 255));&amp;quot;&amp;gt;- Hardening de Host/Guest: Configuração de SO enxuto (minimal) e desativação de serviços desnecessários;&amp;lt;br&amp;gt;&amp;lt;/span&amp;gt;&amp;lt;span style=&amp;quot;background-color: transparent; color: light-dark(rgb(0, 0, 0), rgb(255, 255, 255));&amp;quot;&amp;gt;- Segurança de Acesso: Proibição de login de root via SSH e autenticação exclusiva por par de chaves;&amp;lt;br&amp;gt;&amp;lt;/span&amp;gt;&amp;lt;span style=&amp;quot;background-color: transparent; color: light-dark(rgb(0, 0, 0), rgb(255, 255, 255));&amp;quot;&amp;gt;- Isolamento de Rede: Containers operando em redes virtuais apartadas (Micro-segmentação);&amp;lt;br&amp;gt;&amp;lt;/span&amp;gt;&amp;lt;span style=&amp;quot;background-color: transparent; color: light-dark(rgb(0, 0, 0), rgb(255, 255, 255));&amp;quot;&amp;gt;- Alta Disponibilidade: Configuração de redundância em Pods e balanceamento de carga nativo;&amp;lt;br&amp;gt;- Sensores de SIEMs/XDRs&amp;lt;/span&amp;gt;&amp;lt;/p&amp;gt;&amp;lt;h1 style=&amp;quot;margin-top: 0px;&amp;quot;&amp;gt;&amp;lt;p style=&amp;quot;font-size: 12px; font-weight: 400;&amp;quot;&amp;gt;&amp;lt;br&amp;gt;&amp;lt;/p&amp;gt;&amp;lt;/h1&amp;gt;&amp;lt;p&amp;gt;&amp;lt;br&amp;gt;&amp;lt;/p&amp;gt;\&quot; vertex=\&quot;1\&quot;&gt;\n          &lt;mxGeometry height=\&quot;244\&quot; width=\&quot;332.08\&quot; x=\&quot;-22\&quot; y=\&quot;120\&quot; as=\&quot;geometry\&quot; /&gt;\n        &lt;/mxCell&gt;\n        &lt;mxCell id=\&quot;RzzEl4RtM9gMvDJJZMXP-6\&quot; parent=\&quot;1\&quot; style=\&quot;text;html=1;whiteSpace=wrap;overflow=hidden;rounded=0;\&quot; value=\&quot;&amp;lt;h1 style=&amp;quot;margin-top: 0px;&amp;quot;&amp;gt;Dados&amp;lt;/h1&amp;gt;&amp;lt;p&amp;gt;Considerando a mesma visão dos servidores, mas com p&amp;lt;span style=&amp;quot;background-color: transparent; color: light-dark(rgb(0, 0, 0), rgb(255, 255, 255));&amp;quot;&amp;gt;roteção da camada de persistência de dados.&amp;lt;/span&amp;gt;&amp;lt;/p&amp;gt;&amp;lt;p&amp;gt;- RBAC (Role-Based Access Control): Acesso estritamente limitado por função de usuário/aplicação;&amp;lt;br&amp;gt;&amp;lt;span style=&amp;quot;background-color: transparent; color: light-dark(rgb(0, 0, 0), rgb(255, 255, 255));&amp;quot;&amp;gt;- Criptografia em Repouso (At-Rest): Garantir que os dados no disco estejam cifrados&amp;lt;br&amp;gt;&amp;lt;/span&amp;gt;&amp;lt;span style=&amp;quot;background-color: transparent; color: light-dark(rgb(0, 0, 0), rgb(255, 255, 255));&amp;quot;&amp;gt;- Auditoria de Consultas (AAA): Logs detalhados de quem acessou qual dado e quando (Audit Trail);&amp;lt;br&amp;gt;- DLP (Data Loss Prevention) para evitar perda de dados, com bloqueio na transferencia de dados e monitoramento de trafego de dados;&amp;lt;br&amp;gt;- Sensores de SIEM e XDRs&amp;lt;/span&amp;gt;&amp;lt;/p&amp;gt;\&quot; vertex=\&quot;1\&quot;&gt;\n          &lt;mxGeometry height=\&quot;229\&quot; width=\&quot;398.27\&quot; x=\&quot;-113.27\&quot; y=\&quot;449\&quot; as=\&quot;geometry\&quot; /&gt;\n        &lt;/mxCell&gt;\n        &lt;mxCell id=\&quot;RzzEl4RtM9gMvDJJZMXP-7\&quot; parent=\&quot;1\&quot; style=\&quot;text;html=1;whiteSpace=wrap;overflow=hidden;rounded=0;\&quot; value=\&quot;&amp;lt;h1 style=&amp;quot;margin-top: 0px;&amp;quot;&amp;gt;&amp;lt;span style=&amp;quot;background-color: transparent; color: light-dark(rgb(0, 0, 0), rgb(255, 255, 255));&amp;quot;&amp;gt;VMs e Containers&amp;lt;/span&amp;gt;&amp;lt;/h1&amp;gt;&amp;lt;h1 style=&amp;quot;margin-top: 0px;&amp;quot;&amp;gt;&amp;lt;span style=&amp;quot;background-color: transparent; color: light-dark(rgb(0, 0, 0), rgb(255, 255, 255)); font-size: 12px; font-weight: normal;&amp;quot;&amp;gt;Implementar virtualização segura e orquestração resiliente.&amp;lt;/span&amp;gt;&amp;lt;/h1&amp;gt;&amp;lt;p&amp;gt;&amp;lt;span style=&amp;quot;background-color: transparent; color: light-dark(rgb(0, 0, 0), rgb(255, 255, 255));&amp;quot;&amp;gt;Proteção:&amp;lt;br&amp;gt;&amp;lt;/span&amp;gt;&amp;lt;span style=&amp;quot;background-color: transparent; color: light-dark(rgb(0, 0, 0), rgb(255, 255, 255));&amp;quot;&amp;gt;- Hardening de Host/Guest: Configuração de SO enxuto (minimal) e desativação de serviços desnecessários;&amp;lt;br&amp;gt;&amp;lt;/span&amp;gt;&amp;lt;span style=&amp;quot;background-color: transparent; color: light-dark(rgb(0, 0, 0), rgb(255, 255, 255));&amp;quot;&amp;gt;- Segurança de Acesso: Proibição de login de root via SSH e autenticação exclusiva por par de chaves;&amp;lt;br&amp;gt;&amp;lt;/span&amp;gt;&amp;lt;span style=&amp;quot;background-color: transparent; color: light-dark(rgb(0, 0, 0), rgb(255, 255, 255));&amp;quot;&amp;gt;- Isolamento de Rede: Containers operando em redes virtuais apartadas (Micro-segmentação);&amp;lt;br&amp;gt;&amp;lt;/span&amp;gt;&amp;lt;span style=&amp;quot;background-color: transparent; color: light-dark(rgb(0, 0, 0), rgb(255, 255, 255));&amp;quot;&amp;gt;- Alta Disponibilidade: Configuração de redundância em Pods e balanceamento de carga nativo.&amp;lt;/span&amp;gt;&amp;lt;/p&amp;gt;&amp;lt;h1 style=&amp;quot;margin-top: 0px;&amp;quot;&amp;gt;&amp;lt;p style=&amp;quot;font-size: 12px; font-weight: 400;&amp;quot;&amp;gt;&amp;lt;br&amp;gt;&amp;lt;/p&amp;gt;&amp;lt;/h1&amp;gt;&amp;lt;p&amp;gt;&amp;lt;br&amp;gt;&amp;lt;/p&amp;gt;\&quot; vertex=\&quot;1\&quot;&gt;\n          &lt;mxGeometry height=\&quot;244\&quot; width=\&quot;332.08\&quot; x=\&quot;344\&quot; y=\&quot;125\&quot; as=\&quot;geometry\&quot; /&gt;\n        &lt;/mxCell&gt;\n        &lt;mxCell id=\&quot;RzzEl4RtM9gMvDJJZMXP-8\&quot; parent=\&quot;1\&quot; style=\&quot;text;html=1;whiteSpace=wrap;overflow=hidden;rounded=0;\&quot; value=\&quot;&amp;lt;h1 style=&amp;quot;margin-top: 0px;&amp;quot;&amp;gt;Monitoramento&amp;lt;/h1&amp;gt;&amp;lt;p&amp;gt;&amp;lt;span style=&amp;quot;background-color: transparent; color: light-dark(rgb(0, 0, 0), rgb(255, 255, 255));&amp;quot;&amp;gt;Inserção de agentes/sensores que permitam monitorar dados, processos e demais elementos do ambiente.&amp;lt;/span&amp;gt;&amp;lt;/p&amp;gt;&amp;lt;p&amp;gt;-&amp;amp;nbsp;&amp;lt;span style=&amp;quot;background-color: transparent;&amp;quot;&amp;gt;Gestão de Identidade e Acesso (IAM - Zero Trust):&amp;lt;br&amp;gt;- MFA Obrigatório;&amp;lt;br&amp;gt;- Criptografia de Disco;&amp;lt;br&amp;gt;- NAC (Network Access Control - 802.1X) para garantir que apenas dispositivos com certificados digitais válidos e conformidade de segurança (patching em dia, EDR ativo) possam se conectar à rede;&amp;lt;br&amp;gt;- MDM / UEM (Unified Endpoint Management): Garantir que o sistema operacional esteja atualizado e com as configurações de segurança (GPOs) aplicadas antes de permitir o acesso ao Data Domain;&amp;lt;br&amp;gt;- Sensores de SIEM e XDR;&amp;lt;/span&amp;gt;&amp;lt;/p&amp;gt;\&quot; vertex=\&quot;1\&quot;&gt;\n          &lt;mxGeometry height=\&quot;229\&quot; width=\&quot;398.27\&quot; x=\&quot;-585\&quot; y=\&quot;745\&quot; as=\&quot;geometry\&quot; /&gt;\n        &lt;/mxCell&gt;\n        &lt;mxCell id=\&quot;RzzEl4RtM9gMvDJJZMXP-10\&quot; parent=\&quot;1\&quot; style=\&quot;rounded=0;whiteSpace=wrap;html=1;\&quot; value=\&quot;\&quot; vertex=\&quot;1\&quot;&gt;\n          &lt;mxGeometry height=\&quot;488\&quot; width=\&quot;838\&quot; x=\&quot;1171\&quot; y=\&quot;-452.89\&quot; as=\&quot;geometry\&quot; /&gt;\n        &lt;/mxCell&gt;\n        &lt;mxCell id=\&quot;RzzEl4RtM9gMvDJJZMXP-11\&quot; parent=\&quot;1\&quot; style=\&quot;rounded=0;whiteSpace=wrap;html=1;\&quot; value=\&quot;Monitoramento\&quot; vertex=\&quot;1\&quot;&gt;\n          &lt;mxGeometry height=\&quot;50.60631459430876\&quot; width=\&quot;682.0963040422781\&quot; x=\&quot;1189.1107910271546\&quot; y=\&quot;-452.8876696104514\&quot; as=\&quot;geometry\&quot; /&gt;\n        &lt;/mxCell&gt;\n        &lt;mxCell id=\&quot;RzzEl4RtM9gMvDJJZMXP-12\&quot; parent=\&quot;1\&quot; style=\&quot;text;html=1;whiteSpace=wrap;overflow=hidden;rounded=0;\&quot; value=\&quot;&amp;lt;h1 style=&amp;quot;margin-top: 0px;&amp;quot;&amp;gt;EDR/XDR&amp;lt;/h1&amp;gt;&amp;lt;p&amp;gt;&amp;lt;span style=&amp;quot;background-color: transparent;&amp;quot;&amp;gt;Esta funcionalidade deve ser adicionada com foco em Clients e VMs/Servidores.&amp;lt;font color=&amp;quot;#ba0000&amp;quot;&amp;gt;&amp;lt;br&amp;gt;&amp;lt;/font&amp;gt;&amp;lt;/span&amp;gt;&amp;lt;span style=&amp;quot;background-color: transparent;&amp;quot;&amp;gt;&amp;lt;font color=&amp;quot;#ba0000&amp;quot;&amp;gt;&amp;lt;br&amp;gt;&amp;lt;/font&amp;gt;&amp;lt;font color=&amp;quot;rgba(0, 0, 0, 0)&amp;quot;&amp;gt;-&amp;amp;nbsp;&amp;lt;/font&amp;gt;&amp;lt;/span&amp;gt;&amp;lt;span style=&amp;quot;background-color: transparent; color: light-dark(rgb(0, 0, 0), rgb(255, 255, 255));&amp;quot;&amp;gt;Monitoramento de Processos: Registro de cada execução de binários, scripts e comandos (Powershell, Bash) para detectar anomalias;&amp;lt;br&amp;gt;&amp;lt;/span&amp;gt;&amp;lt;span style=&amp;quot;background-color: transparent; color: light-dark(rgb(0, 0, 0), rgb(255, 255, 255));&amp;quot;&amp;gt;- Análise de Árvore de Processos: Identificar se um processo legítimo (como o Word ou um Navegador) gerou um processo suspeito (como um terminal);&amp;lt;br&amp;gt;&amp;lt;/span&amp;gt;&amp;lt;span style=&amp;quot;background-color: transparent; color: light-dark(rgb(0, 0, 0), rgb(255, 255, 255));&amp;quot;&amp;gt;- Isolamento de Host: Capacidade de &amp;quot;cortar&amp;quot; a rede do dispositivo infectado remotamente para conter um surto de malware;&amp;lt;br&amp;gt;&amp;lt;/span&amp;gt;&amp;lt;span style=&amp;quot;background-color: transparent; color: light-dark(rgb(0, 0, 0), rgb(255, 255, 255));&amp;quot;&amp;gt;- Remediação: Rollback de alterações feitas por ransomware ou remoção automática de persistências no registro/arquivos;&amp;lt;br&amp;gt;&amp;lt;/span&amp;gt;&amp;lt;span style=&amp;quot;background-color: transparent; color: light-dark(rgb(0, 0, 0), rgb(255, 255, 255));&amp;quot;&amp;gt;- Visibilidade Transversal: Unificar a visão do que acontece no &amp;quot;Client&amp;quot; com o que o &amp;quot;WAF&amp;quot; e o &amp;quot;CDN&amp;quot; estão vendo;&amp;lt;br&amp;gt;&amp;lt;/span&amp;gt;&amp;lt;span style=&amp;quot;background-color: transparent; color: light-dark(rgb(0, 0, 0), rgb(255, 255, 255));&amp;quot;&amp;gt;- Resposta Orquestrada: Se o XDR detecta um ataque no servidor Python (Uvicorn), ele pode automaticamente instruir o Firewall de Borda a bloquear o IP do atacante;&amp;lt;br&amp;gt;&amp;lt;/span&amp;gt;&amp;lt;span style=&amp;quot;background-color: transparent; color: light-dark(rgb(0, 0, 0), rgb(255, 255, 255));&amp;quot;&amp;gt;- Threat Hunting: Ferramentas de busca proativa por ameaças baseadas em IOCs (Indicadores de Comprometimento) globais.&amp;lt;/span&amp;gt;&amp;lt;/p&amp;gt;&amp;lt;p&amp;gt;&amp;lt;br&amp;gt;&amp;lt;/p&amp;gt;\&quot; vertex=\&quot;1\&quot;&gt;\n          &lt;mxGeometry height=\&quot;427\&quot; width=\&quot;332.08\&quot; x=\&quot;1558\&quot; y=\&quot;-384.89\&quot; as=\&quot;geometry\&quot; /&gt;\n        &lt;/mxCell&gt;\n        &lt;mxCell id=\&quot;RzzEl4RtM9gMvDJJZMXP-13\&quot; parent=\&quot;1\&quot; style=\&quot;text;html=1;whiteSpace=wrap;overflow=hidden;rounded=0;\&quot; value=\&quot;&amp;lt;h1 style=&amp;quot;margin-top: 0px;&amp;quot;&amp;gt;SIEM&amp;lt;/h1&amp;gt;&amp;lt;p&amp;gt;Implementado para centralizar os eventos e dar capilardade na detecção do que está ocorrendo&amp;lt;/p&amp;gt;&amp;lt;p&amp;gt;Centralização de Logs (Log Management): Coletar eventos do Roteador, NGFW, WAF, Bancos de Dados e Cloudflare em um único local;&amp;lt;br&amp;gt;&amp;lt;span style=&amp;quot;background-color: transparent; color: light-dark(rgb(0, 0, 0), rgb(255, 255, 255));&amp;quot;&amp;gt;- Correlação de Eventos: Identificar que um erro de login no Banco de Dados (Data Domain) está relacionado a um tráfego suspeito detectado pelo WAF minutos antes;&amp;lt;br&amp;gt;&amp;lt;/span&amp;gt;&amp;lt;span style=&amp;quot;background-color: transparent; color: light-dark(rgb(0, 0, 0), rgb(255, 255, 255));&amp;quot;&amp;gt;- Dashboard de Conformidade: Gerar relatórios automáticos para auditorias de conformidade (NIST, ISO 27001);&amp;lt;br&amp;gt;&amp;lt;/span&amp;gt;&amp;lt;span style=&amp;quot;background-color: transparent; color: light-dark(rgb(0, 0, 0), rgb(255, 255, 255));&amp;quot;&amp;gt;- Retenção de Dados: Armazenamento histórico de logs para perícia digital (Forensics) após um incidente.&amp;lt;/span&amp;gt;&amp;lt;/p&amp;gt;\&quot; vertex=\&quot;1\&quot;&gt;\n          &lt;mxGeometry height=\&quot;347.12\&quot; width=\&quot;300.79\&quot; x=\&quot;1212\&quot; y=\&quot;-369.89\&quot; as=\&quot;geometry\&quot; /&gt;\n        &lt;/mxCell&gt;\n        &lt;mxCell id=\&quot;RzzEl4RtM9gMvDJJZMXP-14\&quot; edge=\&quot;1\&quot; parent=\&quot;1\&quot; source=\&quot;Jj2LBuBIAdHEPYUArqaq-3\&quot; style=\&quot;edgeStyle=orthogonalEdgeStyle;rounded=0;orthogonalLoop=1;jettySize=auto;html=1;\&quot; target=\&quot;RzzEl4RtM9gMvDJJZMXP-10\&quot;&gt;\n          &lt;mxGeometry relative=\&quot;1\&quot; as=\&quot;geometry\&quot; /&gt;\n        &lt;/mxCell&gt;\n        &lt;mxCell id=\&quot;RzzEl4RtM9gMvDJJZMXP-15\&quot; edge=\&quot;1\&quot; parent=\&quot;1\&quot; source=\&quot;Jj2LBuBIAdHEPYUArqaq-4\&quot; style=\&quot;edgeStyle=orthogonalEdgeStyle;rounded=0;orthogonalLoop=1;jettySize=auto;html=1;\&quot; target=\&quot;RzzEl4RtM9gMvDJJZMXP-10\&quot;&gt;\n          &lt;mxGeometry relative=\&quot;1\&quot; as=\&quot;geometry\&quot; /&gt;\n        &lt;/mxCell&gt;\n      &lt;/root&gt;\n    &lt;/mxGraphModel&gt;\n  &lt;/diagram&gt;\n&lt;/mxfile&gt;\n&quot;}"></div>
