<html><head><title>Meu Site</title>
<meta charset="UTF-8">
</head><body>
<table border=1><tr><td>Índice</td><td>Aluno</td><td>Nota</td></tr>
<script type="text/javascript">
var indice=0;
var notas=2.75;
while (indice<30){
  indice++;
  document.write('<tr><td>'+indice+'</td><td>Aluno '+indice+'</td><td>'+notas+'</td></tr>');
  notas=notas+0.25;
}
</script>
</table>
</body></html>
