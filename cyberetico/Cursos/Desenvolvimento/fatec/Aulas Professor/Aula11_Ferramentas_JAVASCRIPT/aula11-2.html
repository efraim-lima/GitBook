<html><head></head><body>
<script type"type/javascript">
alunos=[];  //array vazio de alunos
function inclui_alunos (nomedoaluno,posicao) {
   alunos[posicao]=nomedoaluno;
}
function buscar_aluno (nome_buscar) {
 for(a=0;a<3;a++){
    if (nome_buscar==alunos[a]){
       alert("Aluno "+nome_buscar+" tem número: "+(a+1));
    }
  }
}
function lista_alunos() {
 document.write('<table border=1>');
 for(a=0;a<3;a++){
    document.write('<tr><td>'+(parseInt(a)+1)+'</td><td>'+alunos[a]+'</td></tr>');    
    }
 document.write('</table>');
}

//Cria uma rotina que pega o nome chama função inclui_alunos 30 vezes
var indice;
var nomedoaluno;
for (indice=0;indice<3;indice++){
    nomedoaluno=prompt("informe o nome do aluno");
    inclui_alunos(nomedoaluno,indice);
}
//Pegar o nome do aluno para buscar no array
var nome_buscar;
nome_buscar=prompt("Informe o aluno para busca");
//Chamar a rotina buscar aluno que verifica no array se o aluno existe. 
//Se ele existir mostra na tela o índice (número) do aluno
buscar_aluno(nome_buscar);
lista_alunos();
</script>
</body></html>
