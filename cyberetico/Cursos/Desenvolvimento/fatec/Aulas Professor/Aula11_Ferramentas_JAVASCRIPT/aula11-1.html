<html><head></head><body>
<script type="text/javascript">
var a="4.50"; 
a=parseFloat(a); 
alert(a);                      //Mostra "4.5" na tela
var b="9"; c=0;
c=parseInt(b);
alert(c);                      //Mostra "9" na tela
var nome="Maria";           
alert(nome.length);            //Mostra 5 na tela
alert(nome.charAt(3));         //Mostra i na tela
alert(nome.indexOf("i"));      //Mostra 3 na tela
alert(nome.substring(0,3));    //Mostra "Mar" na tela
alert(nome.toUpperCase()); //Mostra "MARIA" na tela
alert(nome.toLowerCase()); //Mostra "maria" na tela
alert(escape("#$%&"));  //Retorna em hexadecimal %23%24%25%26 
alert(unescape("%23%24%25%26")); //Retorna "#$%&" na tela
var novadata=new Date();
document.write(novadata); //Mostra Thu Oct 23 2025 10:54:57 GMT-0300
</script>
</body></html>
