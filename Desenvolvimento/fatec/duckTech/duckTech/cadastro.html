<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Funcionário - Duck Tech</title>
    <link rel="stylesheet" href="style.css">
    <style type="text/css">
        body {
            background-color: #1C1526;
            font-family: 'Roboto', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 30px;
        }
        div#form-container {
            max-width: 1000px;
            margin: 0 auto;
            background-color: #2D2540;
            padding: 25px;
            border: 1px;
        }
        h2 {
            color: #F2A413;
            text-align: center;
            margin-top: 0;
        }
        table#tabela-cad {
            width: 100%;
        }
        table#tabela-cad td {
            padding: 10px 12px;
            border: none;
            vertical-align: middle;
        }
        table#tabela-cad td:first-child,
        table#tabela-cad td:nth-child(3) {
            width: 20%;
            text-align: right;
            font-weight: bold;
            color: #F2F2F2;
        }
        table#tabela-cad td:nth-child(2),
        table#tabela-cad td:nth-child(4) {
            width: 30%;
        }
        input, select {
            width: 100%;
            padding: 8px 10px;
        }
        div#botao-container {
            text-align: center;
            margin-top: 20px;
        }
        button {
            background-color: #F2A413;
            color: #1C1526;
            border: none;
            padding: 10px 40px;
            border-radius: 40px;
            font-weight: bold;
        }
        button:hover {
            background-color: #A67721;
            color: white;
        }
    </style>
    <script type="text/javascript">
        function validarFormulario() {
            // Acessa o formulário pelo nome (definido na tag <form>)
            var frm = document.forms["formCadastro"];

            // 1. Validação de campos obrigatórios (não vazios)
            if (frm.nome.value.trim() == "") {
                alert("Campo Nome é obrigatório.");
                document.getElementById("nome").focus();
                return false;
            }
            if (frm.endereco.value.trim() == "") {
                alert("Campo Endereço é obrigatório.");
                document.getElementById("endereco").focus();
                return false;
            }
            if (frm.complemento.value.trim() == "") {
                alert("Campo Complemento é obrigatório.");
                document.getElementById("complemento").focus();
                return false;
            }
            if (frm.bairro.value.trim() == "") {
                alert("Campo Bairro é obrigatório.");
                document.getElementById("bairro").focus();
                return false;
            }
            if (frm.cidade.value.trim() == "") {
                alert("Campo Cidade é obrigatório.");
                document.getElementById("cidade").focus();
                return false;
            }
            if (frm.email.value.trim() == "") {
                alert("Campo Email é obrigatório.");
                document.getElementById("email").focus();
                return false;
            }
            if (frm.usuario.value.trim() == "") {
                alert("Campo Usuário é obrigatório.");
                document.getElementById("usuario").focus();
                return false;
            }
            if (frm.senha.value.trim() == "") {
                alert("Campo Senha é obrigatório.");
                document.getElementById("senha").focus();
                return false;
            }
            if (frm.celular.value.trim() == "") {
                alert("Campo Celular é obrigatório.");
                document.getElementById("celular").focus();
                return false;
            }

            // 2. Validação de caracteres especiais nos campos: nome, endereço, cidade, bairro
            var especiais = "*#!@<>";
            function temCaractereEspecial(str) {
                for (var i = 0; i < especiais.length; i++) {
                    if (str.indexOf(especiais[i]) != -1) return true;
                }
                return false;
            }

            var nomeValor = frm.nome.value;
            if (temCaractereEspecial(nomeValor)) {
                alert("Nome não pode conter caracteres especiais (*, #, !, @, <, >).");
                document.getElementById("nome").focus();
                return false;
            }
            var enderecoValor = frm.endereco.value;
            if (temCaractereEspecial(enderecoValor)) {
                alert("Endereço não pode conter caracteres especiais (*, #, !, @, <, >).");
                document.getElementById("endereco").focus();
                return false;
            }
            var cidadeValor = frm.cidade.value;
            if (temCaractereEspecial(cidadeValor)) {
                alert("Cidade não pode conter caracteres especiais (*, #, !, @, <, >).");
                document.getElementById("cidade").focus();
                return false;
            }
            var bairroValor = frm.bairro.value;
            if (temCaractereEspecial(bairroValor)) {
                alert("Bairro não pode conter caracteres especiais (*, #, !, @, <, >).");
                document.getElementById("bairro").focus();
                return false;
            }

            // 3. Validação do select UF: selectedIndex == 0 significa "Selecione"
            if (frm.uf.selectedIndex == 0) {
                alert("Selecione um estado (UF).");
                document.getElementById("uf").focus();
                return false;
            }

            // 4. Validação de email: deve conter '@' e um '.' após o '@'
            var emailValor = frm.email.value;
            if (emailValor.indexOf('@') == -1 || emailValor.indexOf('.') == -1 || emailValor.lastIndexOf('.') < emailValor.indexOf('@')) {
                alert("Email inválido. Deve conter '@' e um ponto (.) após o @.");
                document.getElementById("email").focus();
                return false;
            }

            // 5. Validação do celular: apenas números (se não estiver vazio)
            var celularValor = frm.celular.value;
            if (isNaN(celularValor) || celularValor.indexOf(' ') != -1) {
                alert("Celular deve conter apenas números.");
                document.getElementById("celular").focus();
                return false;
            }

            // Se todas as validações passarem, retorna true (formulário é enviado)
            return true;
        }
    </script>
</head>
<body style="background-color:#1C1526;">
    <div id="form-container">
        <h2>Cadastro de Funcionário</h2>
        <!-- FORMULÁRIO COM NOME E ONSUBMIT -->
        <form name="formCadastro" action="cadastro.php" method="post" onsubmit="return validarFormulario()">
            <table id="tabela-cad" border="0">
                <!-- Linha 1: Nome | Email -->
                <tr>
                    <td><label for="nome">Nome:</label></td>
                    <td><input type="text" id="nome" name="nome" required></td>
                    <td><label for="email">Email:</label></td>
                    <td><input type="email" id="email" name="email" required></td>
                </tr>
                <!-- Linha 2: Endereço | Celular -->
                <tr>
                    <td><label for="endereco">Endereço:</label></td>
                    <td><input type="text" id="endereco" name="endereco"></td>
                    <td><label for="celular">Celular:</label></td>
                    <td><input type="tel" id="celular" name="celular" placeholder="(11) 99999-9999"></td>
                </tr>
                <!-- Linha 3: Complemento | CEP -->
                <tr>
                    <td><label for="complemento">Complemento:</label></td>
                    <td><input type="text" id="complemento" name="complemento"></td>
                    <td><label for="cep">CEP:</label></td>
                    <td><input type="text" id="cep" name="cep" placeholder="00000-000"></td>
                </tr>
                <!-- Linha 4: Bairro | UF -->
                <tr>
                    <td><label for="bairro">Bairro:</label></td>
                    <td><input type="text" id="bairro" name="bairro"></td>
                    <td><label for="uf">UF:</label></td>
                    <td>
                        <select id="uf" name="uf">
                            <option value="">Selecione</option>
                            <option value="AC">AC</option><option value="AL">AL</option><option value="AP">AP</option>
                            <option value="AM">AM</option><option value="BA">BA</option><option value="CE">CE</option>
                            <option value="DF">DF</option><option value="ES">ES</option><option value="GO">GO</option>
                            <option value="MA">MA</option><option value="MT">MT</option><option value="MS">MS</option>
                            <option value="MG">MG</option><option value="PA">PA</option><option value="PB">PB</option>
                            <option value="PR">PR</option><option value="PE">PE</option><option value="PI">PI</option>
                            <option value="RJ">RJ</option><option value="RN">RN</option><option value="RS">RS</option>
                            <option value="RO">RO</option><option value="RR">RR</option><option value="SC">SC</option>
                            <option value="SP">SP</option><option value="SE">SE</option><option value="TO">TO</option>
                        </select>
                    </td>
                </tr>
                <!-- Linha 5: Cidade | Cargo -->
                <tr>
                    <td><label for="cidade">Cidade:</label></td>
                    <td><input type="text" id="cidade" name="cidade"></td>
                    <td><label for="cargo">Cargo:</label></td>
                    <td>
                        <select id="cargo" name="cargo">
                            <option value="">Selecione</option>
                            <option>Diretor</option><option>Gerente</option><option>Analista</option>
                            <option>Programador</option><option>Suporte</option><option>Administrador</option>
                            <option>Estagiário</option><option>Outros</option>
                        </select>
                    </td>
                </tr>
                <!-- Linha 6: Usuário | Departamento -->
                <tr>
                    <td><label for="usuario">Usuário:</label></td>
                    <td><input type="text" id="usuario" name="usuario"></td>
                    <td><label for="departamento">Departamento:</label></td>
                    <td>
                        <select id="departamento" name="departamento">
                            <option value="">Selecione</option>
                            <option>Gestão</option><option>TI</option><option>RH</option>
                            <option>Comercial</option><option>Operações</option>
                        </select>
                    </td>
                </tr>
                <!-- Linha 7: Senha | botão Enviar -->
                <tr>
                    <td><label for="senha">Senha:</label></td>
                    <td><input type="password" id="senha" name="senha"></td>
                    <td colspan="2">
                        <div id="botao-container">
                            <button type="submit">Enviar Cadastro</button>
                        </div>
                    </td>
                </tr>
            </table>
        </form>
    </div>
</body>
</html>
