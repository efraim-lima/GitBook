<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <style type="text/css">
        body {
            margin: 0;
            padding: 0;
            background-color: #2D2540;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
        }
        div#img-container {
            width: 100%;
            text-align: center;
            background: linear-gradient(135deg, #F2A413 0%, #A67721 100%);
            padding: 10px 0;
        }
        img {
            max-width: 100%;
            max-height: 110px;
            width: auto;
            height: auto;
        }
    </style>
</head>
<body style="background-color:#2D2540;">
    <div id="img-container">
        <img src="duck_header.png" alt="Duck Tech - Tecnologia com personalidade">
    </div>
</body>
</html>
