<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Duck Tech - Home</title>
    <link rel="stylesheet" href="style.css">
    <style type="text/css">
        body {
            margin: 0;
            padding: 20px;
            background-color: #1C1526;
        }
        div#container {
            max-width: 1400px;
            margin: 0 auto;
            background-color: #2D2540;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }
        iframe {
            border: none;
            display: block;
        }
        iframe#header-frame {
            width: 100%;
            height: 120px;
        }
        table#layout {
            width: 100%;
        }
        table#layout td {
            vertical-align: top;
            padding: 0;
        }
        td#menu-cell {
            width: 25%;
            min-width: 200px;
            background-color: #1C1526;
            border-right: 1px solid #734A19;
        }
        td#content-cell {
            background-color: #1C1526;
        }
        iframe#menu-frame {
            width: 100%;
            height: calc(100vh - 140px);
            min-height: 500px;
        }
        iframe#content-frame {
            width: 100%;
            height: calc(100vh - 140px);
            min-height: 500px;
        }
        
    </style>
</head>
<body style="margin:0; padding:20px; background-color:#1C1526;">
    <div id="container">
        <iframe id="header-frame" src="header.html" scrolling="no"></iframe>
        <table id="layout" cellpadding="0" cellspacing="0">
            <tr>
                <td id="menu-cell">
    <iframe id="menu-frame" src="menu_lateral.html" scrolling="no" style="width:100%; height:100%; border:none;"></iframe>
                </td>
                <td id="content-cell">
                    <iframe id="content-frame" src="home.html" name="conteudo" scrolling="auto"></iframe>
                </td>
            </tr>
        </table>
    </div>
</body>
</html>
